version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # The Next.js server proxies /api/* to the backend over the Docker network
      # (see frontend/next.config.js). The browser only ever talks to same-origin /api.
      - API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend
    networks:
      - ff-network

  backend:
    build:
      context: ./frontend/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
    networks:
      - ff-network

networks:
  ff-network:
    driver: bridge
